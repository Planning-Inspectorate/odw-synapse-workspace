# azure-pipelines-pr-lifecycle.yml
name: Close stale issues and PRs

trigger: none
pr: none

schedules:
  - cron: "0 0 * * *"   # daily at midnight
    displayName: Close stale issues and PRs
    branches:
      include:
        - main
    always: true

pool: pins-agent-pool-odw-build-uks

steps:
  - checkout: self

  - script: |
      echo "Finding and marking stale issues and PRs..."

      REPO="Planning-Inspectorate/odw-synapse-workspace"
      DAYS_BEFORE_STALE=14
      DAYS_BEFORE_CLOSE=7

      # Example: list open issues/PRs and process them.
      # You can expand this into full stale logic (labels, comments, closing)
      # similar to actions/stale.

      echo "This is a placeholder. Implement your stale logic here using GitHub REST API."
      echo "For example:"
      echo "  - gh api repos/$REPO/issues ..."
    displayName: Run stale cleanup logic
    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)
