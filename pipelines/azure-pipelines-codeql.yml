trigger:
  branches:
    include:
      - main
      - feat

pr:
  branches:
    include:
      - main
      - feat

schedules:
- cron: "21 19 * * 0"
  displayName: Weekly CodeQL Scan
  branches:
    include:
      - main
  always: true

# Import the common repository
resources:
  repositories:
  - repository: odw-common
    type: github
    name: Planning-Inspectorate/odw-common
    endpoint: Planning-Inspectorate
    ref: main

pool: pins-agent-pool-odw-build-uks

variables:
  language: 'python'

stages:
- template: pipelines/stages/run-codeql-analysis.yaml@odw-common
  parameters:
    language: ${{ variables.language }}
