# azure-pipelines-pr-lifecycle.yml
name: Close stale issues and PRs

# trigger: none
# pr: none

schedules:
  - cron: "0 0 * * *"   # daily at midnight
    displayName: Close stale issues and PRs
    branches:
      include:
        - main
    always: true

pool: pins-agent-pool-odw-build-uks

variables:
- group: GitHub-Secrets  # PAT stored in Variable Group

steps:
  - checkout: self

  - script: |
      echo "Checking for stale PRs..."

      REPO="Planning-Inspectorate/odw-synapse-workspace"

      # PRs with no activity for 14 days → mark stale
      stale_prs=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/pulls?state=open" | \
        jq '.[] | select(.updated_at < "'$(date -d "14 days ago" -Iseconds)'") | .number')

      for pr in $stale_prs; do
        echo "Marking PR #$pr as stale..."
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"labels":["stale"]}' \
          "https://api.github.com/repos/$REPO/issues/$pr/labels"
      done

      # PRs with no activity for 21 days → close
      very_stale_prs=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/pulls?state=open" | \
        jq '.[] | select(.updated_at < "'$(date -d "21 days ago" -Iseconds)'") | .number')

      for pr in $very_stale_prs; do
        echo "Closing PR #$pr..."
        curl -s -X PATCH \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"state":"closed"}' \
          "https://api.github.com/repos/$REPO/pulls/$pr"
      done

    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)
      
    displayName: Close stale PRs


